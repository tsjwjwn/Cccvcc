<!DOCTYPE html><html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2D Fishing RPG</title><style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  overflow:hidden;
  background:#0d47a1;
}

canvas{
  display:block;
  background:linear-gradient(#4fc3f7,#01579b);
}

#ui{
  position:absolute;
  top:10px;
  left:10px;
  background:rgba(0,0,0,0.45);
  color:white;
  padding:12px;
  border-radius:14px;
  width:240px;
}

#skills{
  margin-top:10px;
}

button{
  width:100%;
  padding:8px;
  border:none;
  margin-top:6px;
  border-radius:10px;
  background:#ffd54f;
  font-weight:bold;
}

#msg{
  margin-top:10px;
  color:#fff176;
  min-height:40px;
}
</style></head>
<body><div id="ui">
<h2>🎣 Fishing RPG</h2>
<div>💰 Vàng: <span id="gold">0</span></div>
<div>⭐ Level: <span id="level">1</span></div>
<div>❤️ Máu cá: <span id="fishhp">0</span></div>
<div>🎯 Combo: <span id="combo">0</span></div><div id="skills">
<button onclick="castRod()">🎣 Quăng cần</button>
<button onclick="skillShockwave()">⚡ Shock Wave</button>
<button onclick="skillFreeze()">❄️ Ice Freeze</button>
<button onclick="dash()">💨 Dash</button>
</div><div id="msg">Di chuyển bằng A D hoặc ← →</div>
</div><canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

canvas.width = innerWidth;
canvas.height = innerHeight;

const goldEl = document.getElementById('gold');
const levelEl = document.getElementById('level');
const fishHpEl = document.getElementById('fishhp');
const comboEl = document.getElementById('combo');
const msg = document.getElementById('msg');

let keys = {};
let gold = 0;
let level = 1;
let combo = 0;
let lineAnimation = 0;
let freezeMode = false;

const player = {
  x: canvas.width/2,
  y: 220,
  w: 45,
  h: 70,
  speed: 5,
  facing:1,
  casting:false,
  dashPower:25
};

let fishBoss = {
  x: 300,
  y: 500,
  w: 90,
  h: 45,
  hp:100,
  maxHp:100,
  speed:3,
  dir:1,
  stunned:false,
  rare:'🐉'
};

function spawnFishBoss(){
  fishBoss.hp = 80 + level*30;
  fishBoss.maxHp = fishBoss.hp;
  fishBoss.x = Math.random()*canvas.width;
  fishBoss.y = 400 + Math.random()*220;
  fishBoss.speed = 2 + Math.random()*4;
}

window.addEventListener('keydown',e=>keys[e.key]=true);
window.addEventListener('keyup',e=>keys[e.key]=false);

function movePlayer(){
  if(keys['a'] || keys['ArrowLeft']){
    player.x -= player.speed;
    player.facing = -1;
  }

  if(keys['d'] || keys['ArrowRight']){
    player.x += player.speed;
    player.facing = 1;
  }

  player.x = Math.max(50,Math.min(canvas.width-50,player.x));
}

function drawPlayer(){
  
  ctx.fillStyle='#6d4c41';
  ctx.fillRect(player.x-15,player.y,30,55);

  ctx.fillStyle='#ffe0b2';
  ctx.beginPath();
  ctx.arc(player.x,player.y-20,18,0,Math.PI*2);
  ctx.fill();

  ctx.strokeStyle='black';
  ctx.lineWidth=5;

  if(player.casting){
    ctx.beginPath();
    ctx.moveTo(player.x,player.y+10);
    ctx.lineTo(player.x+90*player.facing,player.y-50);
    ctx.stroke();

    ctx.strokeStyle='white';
    ctx.beginPath();
    ctx.moveTo(player.x+90*player.facing,player.y-50);
    ctx.lineTo(player.x+90*player.facing,player.y-50+lineAnimation);
    ctx.stroke();
  }
  else{
    ctx.beginPath();
    ctx.moveTo(player.x,player.y+10);
    ctx.lineTo(player.x+45*player.facing,player.y-10);
    ctx.stroke();
  }
}

function drawFishBoss(){
  ctx.fillStyle = freezeMode ? '#80deea' : '#ef5350';

  ctx.beginPath();
  ctx.ellipse(fishBoss.x,fishBoss.y,fishBoss.w,fishBoss.h,0,0,Math.PI*2);
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(fishBoss.x-fishBoss.w,fishBoss.y);
  ctx.lineTo(fishBoss.x-fishBoss.w-35,fishBoss.y-20);
  ctx.lineTo(fishBoss.x-fishBoss.w-35,fishBoss.y+20);
  ctx.fill();

  ctx.fillStyle='white';
  ctx.fillRect(fishBoss.x-60,fishBoss.y-80,120,12);

  ctx.fillStyle='lime';
  ctx.fillRect(fishBoss.x-60,fishBoss.y-80,120*(fishBoss.hp/fishBoss.maxHp),12);
}

function moveFishBoss(){
  if(freezeMode) return;

  fishBoss.x += fishBoss.speed * fishBoss.dir;

  if(fishBoss.x > canvas.width-100 || fishBoss.x < 100){
    fishBoss.dir *= -1;
  }
}

function castRod(){
  if(player.casting) return;

  player.casting = true;
  lineAnimation = 0;

  let interval = setInterval(()=>{
    lineAnimation += 18;

    if(lineAnimation > 360){
      clearInterval(interval);
      hitFish();
      player.casting = false;
    }
  },16);
}

function hitFish(){
  let hookX = player.x + 90*player.facing;
  let hookY = player.y-50+lineAnimation;

  let dx = hookX - fishBoss.x;
  let dy = hookY - fishBoss.y;

  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist < 120){
    let damage = 10 + Math.floor(Math.random()*20);

    if(combo >= 3){
      damage += 20;
    }

    fishBoss.hp -= damage;
    combo++;

    msg.innerText = '🎯 Trúng cá! -'+damage+' HP';

    if(fishBoss.hp <= 0){
      gold += 120 + level*40;
      level++;
      combo = 0;

      goldEl.innerText = gold;
      levelEl.innerText = level;

      msg.innerText = '🏆 Hạ boss cá thành công!';

      spawnFishBoss();
    }
  }
  else{
    combo = 0;
    msg.innerText = '❌ Trượt rồi';
  }
}

function skillShockwave(){
  fishBoss.hp -= 25;
  combo++;
  msg.innerText='⚡ Shock Wave gây 25 sát thương';
}

function skillFreeze(){
  freezeMode = true;
  msg.innerText='❄️ Cá bị đóng băng';

  setTimeout(()=>{
    freezeMode = false;
  },3000);
}

function dash(){
  player.x += player.dashPower * player.facing;
  msg.innerText='💨 Dash né đòn';
}

function drawWaterFX(){
  for(let i=0;i<25;i++){
    ctx.fillStyle='rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.arc(Math.random()*canvas.width,Math.random()*canvas.height,Math.random()*4,0,Math.PI*2);
    ctx.fill();
  }
}

function updateUI(){
  fishHpEl.innerText = Math.max(0,Math.floor(fishBoss.hp));
  comboEl.innerText = combo;
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawWaterFX();
  movePlayer();
  moveFishBoss();

  drawFishBoss();
  drawPlayer();

  updateUI();

  requestAnimationFrame(gameLoop);
}

spawnFishBoss();
gameLoop();

if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}
</script></body>
</html>
